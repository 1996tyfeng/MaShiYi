name: Append Day19 Chat Once

on:
  push:
    paths:
      - 'conversation/pending-day19-chat.md'

permissions:
  contents: write

jobs:
  append:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Append conversation
        run: |
          printf '\n\n' >> 'conversation/小猫喂养问题.md'
          cat 'conversation/pending-day19-chat.md' >> 'conversation/小猫喂养问题.md'
          rm 'conversation/pending-day19-chat.md'
          rm '.github/workflows/append-day19-chat-once.yml'
      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'conversation/小猫喂养问题.md' 'conversation/pending-day19-chat.md' '.github/workflows/append-day19-chat-once.yml'
          git commit -m 'docs(conversation): 同步 7 月 14 日对话'
          git push
